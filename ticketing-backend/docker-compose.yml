services:
  postgres:
    image: postgres:16
    container_name: ticketing-postgres
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: tanmay
      POSTGRES_PASSWORD: tanmay123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ticketing-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: ticketing-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata: